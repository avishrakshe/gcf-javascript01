<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Javascript Arithmetic operator</h1>
    <p>The following are the arithmetic operators in javascript :</p>
    <script>
        var x=10;
        var y=5;
        var sum= x+y;
        var sub= x-y;
        var multi= x*y;
        var div= x/y;
        var mod=x%y;
        var inc=++x;
        var dec=--y;
        console.log("The sum of x and y is: " +sum);
        console.log("The substraction of x and y is: " +sub);
        console.log("The product of x and y is: " +multi);
        console.log("The division of x and y is: " +div);
        console.log("The modulus of x and y is: " +mod);
        console.log("The increment of x is:" +inc);
        console.log("The decrement of x is:" +dec);

        let a=100;
        pre_increment=++a;
        console.log("The value of a after pre-increment is: " +pre_increment);
        pre_decrement=--a;
         console.log("The value of a after pre-decrement is: " +pre_decrement);
         post_increment=a++;
          console.log("The value of a after post-increment is: " +post_increment);
          post_decrement=a--;
           console.log("The value of a after post-decrement is: " +post_decrement);
    </script>
    
</body>
</html>
