<body>
     <h2>Javascript Assignment operator</h2>
    <p>The following are the Assignment operators in javascript :</p>
    <script>
        var x=10;
        var y=5;
        x=y;
        document.write("The value of x after assignment is: " +x);
        x+=y;
        document.write("<br>The value of x after addition assignment is: "+x);
        x-=y;
        document.write("<br>The value of x after substraction assignment is: "+x);
        x*=y;
        document.write("<br>The value of x after multiplication assignment is: "+x);
        x/=y;
        document.write("<br>The value of x after division assignment is: "+x);
        x%=y;
        document.write("<br>The value of x after modulus assignment is: "+x);


 </script>
    
</body>
</html>
