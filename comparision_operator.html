<body>
     <h2>Javascript Comaprison operator</h2>
    <p>The following are the Comaprison operators in javascript :</p>

    <script>
          let a=10;
          let b=20;
          document.write("The value of a is: " +a);
          document.write("<br>The value of b is: " +b);
          document.write("<br> a equal to b =  " +(a==b));
          document.write("<br> a not equal to b =  " +(a!=b));
          document.write("<br> a is greater than b =  " +(a>=b));
          document.write("<br> a is less than b =  " +(a<=b));
          
          
          
          


    </script>
</body>
