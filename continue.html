<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continue in js</title>
</head>
<body>
    <script type="text/javascript">
        var i=0
        for (i=0;i<=10;i++){
            if(i=3){
                continue;
            }
            document.write("The number is " +i);
            document.write("<br/>");
        }
    </script>
    
</body>
</html>
