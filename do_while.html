<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do while loop in js</title>
</head>
<body>
    <script>
        //print 1 to 5
        let i=1;
        do{
            console.log(i);
            i++;
        }
        while(i<=5);
    </script>
    
</body>
</html>
