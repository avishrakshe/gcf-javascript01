<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for in loop in js</title>
</head>
<body>
    <script>
    let student={
        name:"Prity",
        age:18

    }
    for(let key in student){
        document.write(key+": "+student[key]+"<br>");
    }
    </script>
</body>
</html>
