<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For loop in js
    </title>
</head>
<body>
    <script>
        //print 1 to 10
        for(let i=1; i<=10; i++){
            console.log(i);
        }


        //print even number
        for(let i=2;i<=10;i+=2){
            console.log(i);
        }
        //for reverse
        for(let i=5; i>=1; --i){
        console.log(i);
        }
        //for integer
        for(let i=-5; i<=5; i++){
            console.log(i);
        }
        //sum of the first 10 natural numbers
        let sum=0;
        for(let i=1;i<=10;i++){
            sum+=i;
        }
        console.log("Sum of first 10 natural umbers is: "+sum);
    </script>
    
</body>
</html>
