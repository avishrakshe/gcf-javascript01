<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice if else if</title>
</head>
<body>
    <script>
    
    let number = prompt("Enter number ");
        if(number>=90 && number<=100){
            document.write("<br> Your garde is A+");
        }
        else if(number>=80 && number<=90)
        {
           document.write("<br> Your grade is A ");
        
        }
         else if(number>=70 && number<=80)
        {
           document.write("<br> Your grade is B ");
        
        }
         else if(number>=60 && number<=70)
        {
           document.write("<br> Your grade is C ");
        
        }
         else if(number>=50 && number<=60)
        {
           document.write("<br> Your grade is D");
        
        }

         else (number<50)
        {
           document.write("<br> Your grade is FAIL ");
        
        }              
        </script>
    
</body>
</html>
