<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While loop in JS</title>
</head>
<body>
    <script>
        //print 1 to 10
        let i=1;
        while(i<=10){
            console.log(i);
            i++;
        }
    </script>
    
</body>
</html>
